<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GeoJSON con Tabla Interactiva</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
  <style>
    #map { height: 500px; width: 100%; margin-bottom: 20px; }
    table { width: 100%; }
    tr:hover { background-color: #f0f0f0; cursor: pointer; }
  </style>
</head>
<body>

<h2>Mapa</h2>
<div id="map"></div>

<h2>Tabla de propiedades</h2>
<table id="propertiesTable">
  <thead>
    <tr>
      <th>title</th>
      <th>type</th>
      <th>link</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script>
const geojsonURL = 'https://gist.githubusercontent.com/tuusuario/abcdef1234567890/raw/tuarchivo.geojson';

const map = L.map('map').setView([43.33, -3.05], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// Guardamos layers por ID único
let featureLayers = {};

fetch(geojsonURL)
    .then(response => response.json())
    .then(data => {

        L.geoJSON(data, {
            style: { color: 'blue', weight: 4 },

            onEachFeature: function (feature, layer) {

                const id = L.stamp(layer); // ID único de Leaflet

                const popupContent = `
                    <b>${feature.properties.title}</b><br>
                    ${feature.properties.type}<br>
                    <a href="${feature.properties.link}" target="_blank">Abrir enlace</a>
                `;

                layer.bindPopup(popupContent);

                featureLayers[id] = layer;

                // Agregar fila a la tabla
                $('#propertiesTable tbody').append(`
                    <tr data-id="${id}">
                        <td>${feature.properties.title || ''}</td>
                        <td>${feature.properties.type || ''}</td>
                        <td><a href="${feature.properties.link}" target="_blank">${feature.properties.link}</a></td>
                    </tr>
                `);
            }
        }).addTo(map);

        // Inicializar DataTable
        const table = $('#propertiesTable').DataTable();

        // Click en fila
        $('#propertiesTable tbody').on('click', 'tr', function () {

            const id = $(this).data('id');
            const layer = featureLayers[id];

            if (!layer) return;

            let bounds;

            if (layer.getBounds) {
                // LineString o Polygon
                bounds = layer.getBounds();
            } else if (layer.getLatLng) {
                // Point
                const latlng = layer.getLatLng();
                bounds = L.latLngBounds(latlng, latlng);
            }

            map.fitBounds(bounds.pad(0.5), { maxZoom: 17 });
            layer.openPopup();
        });

    })
    .catch(err => console.error('Error cargando GeoJSON:', err));
</script>


</body>
</html>
