<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>GeoJSON con popups clicables</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 600px; width: 100%; }
  </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
// Crear mapa centrado en tu área
const map = L.map('map').setView([43.33, -3.05], 12);

// Capa base OSM
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

// Tu GeoJSON con popups
const geojsonData = {
  "type": "FeatureCollection",
  "features": [
    {
      "type":"Feature",
      "properties":{
        "title":"Prueba",
        "link":"https://www.google.com",
        "descripcion":"Línea de prueba"
      },
      "geometry":{
        "type":"LineString",
        "coordinates":[
          [-3.05047,43.33857],
          [-3.04803,43.34007]
        ]
      }
    },
    {
      "type":"Feature",
      "properties":{
        "title":"2025-0350-RC",
        "link":"https://www.google.com",
        "descripcion":"MultiLineString de prueba"
      },
      "geometry":{
        "type":"MultiLineString",
        "coordinates":[
          [[-2.935,43.262],[-2.93,43.265]],
          [[-2.94,43.27],[-2.935,43.273]],
          [[-2.95,43.26],[-2.945,43.263]],
          [[-2.96,43.268],[-2.955,43.271]]
        ]
      }
    },
    {
      "type":"Feature",
      "properties":{
        "title":"2025-0407-AV",
        "link":"https://www.google.com",
        "descripcion":"Otra línea de prueba"
      },
      "geometry":{
        "type":"LineString",
        "coordinates":[
          [-2.96102,43.32135],
          [-2.96103,43.32133],
          [-2.96103,43.32133],
          [-2.96104,43.32132]
        ]
      }
    }
  ]
};

// Función para mostrar popups clicables
L.geoJSON(geojsonData, {
  style: { color: 'blue', weight: 4 },
  onEachFeature: function (feature, layer) {
    if (feature.properties) {
      const popupContent = `
        <b>${feature.properties.title}</b><br>
        ${feature.properties.descripcion}<br>
        <a href="${feature.properties.link}" target="_blank">Abrir enlace</a>
      `;
      layer.bindPopup(popupContent);
    }
  }
}).addTo(map);
</script>
</body>
</html>
